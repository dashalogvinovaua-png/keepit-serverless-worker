# Модели на томе: /runpod-volume/models/... (через починенный ОТНОСИТЕЛЬНЫЙ симлинк → comfyui/models).
# base_path как у стокового (/runpod-volume) — при нём воркер стабильно опрашивает задачи.
# Добавлены ключи diffusion_models и text_encoders (нужны Wan/LTX — в стоке их нет).
runpod_worker_comfy:
  base_path: /runpod-volume
  checkpoints: models/checkpoints/
  diffusion_models: models/diffusion_models/
  unet: models/diffusion_models/
  text_encoders: models/text_encoders/
  clip: models/text_encoders/
  clip_vision: models/clip_vision/
  loras: models/loras/
  vae: models/vae/
  controlnet: models/controlnet/
  upscale_models: models/upscale_models/
  embeddings: models/embeddings/
  geometry_estimation: models/geometry_estimation/
